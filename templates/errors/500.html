{% extends 'base_public.html' %}
{% load static %}

{% block title %}Server Error - GridWatch{% endblock %}

{% block content %}
<div class="error-container" style="min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div style="text-align: center; max-width: 500px;">
        <div style="font-size: 8rem; font-weight: 800; color: var(--danger);">500</div>
        <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">Server Error</h1>
        <p style="color: var(--gray); margin-bottom: 2rem;">Something went wrong on our end. Please try again later.</p>
        <a href="{% url 'home' %}" class="btn btn-primary">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}

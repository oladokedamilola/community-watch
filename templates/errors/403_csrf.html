{% extends 'base_public.html' %}
{% load static %}

{% block title %}Security Error - GridWatch{% endblock %}

{% block content %}
<div class="error-container" style="min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div style="text-align: center; max-width: 500px;">
        <div style="font-size: 8rem; font-weight: 800; color: var(--danger);">403</div>
        <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">Security Error</h1>
        <p style="color: var(--gray); margin-bottom: 1rem;">CSRF verification failed. Your session may have expired.</p>
        <p style="color: var(--gray); margin-bottom: 2rem; font-size: 0.85rem;">Please refresh the page and try again.</p>
        <a href="{% url 'home' %}" class="btn btn-primary">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}

{% extends 'base_public.html' %}
{% load static %}

{% block title %}Reset Password - GridWatch{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; padding: 2rem 1rem;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <div style="background: var(--primary); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                <i class="fas fa-key" style="font-size: 2rem; color: white;"></i>
            </div>
            <h2>Reset Password</h2>
            <p style="color: var(--gray);">We'll send you a link to reset your password</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="{% url 'accounts:login' %}" class="auth-link">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}

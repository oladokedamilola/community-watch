{% extends 'base_public.html' %}
{% load static %}

{% block title %}Set New Password - GridWatch{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; padding: 2rem 1rem;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <div style="background: var(--primary); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                <i class="fas fa-lock" style="font-size: 2rem; color: white;"></i>
            </div>
            <h2>Set New Password</h2>
            <p style="color: var(--gray);">Create a strong password for your account</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password1" class="form-control" placeholder="Enter new password" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="new_password2" class="form-control" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-check-circle"></i> Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
